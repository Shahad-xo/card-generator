<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">

<style>

body{
text-align:center;
background:#f5f5f5;
font-family:Arial;
}

.container{
position:relative;
width:400px;
margin:auto;
}

.container img{
width:100%;
}

.name{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:240px;
font-size:34px;
color:white;
font-weight:bold;
font-family:Tahoma;
}

button{
margin:5px;
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<h2>اكتب اسمك</h2>

<input type="text" id="name">
<button onclick="generate()">إنشاء البطاقة</button>
<button onclick="download()">تحميل البطاقة</button>

<div class="container" id="card">

<img src="eid.png.png">

<div class="name" id="cardname">
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

function generate(){

let name=document.getElementById("name").value;

document.getElementById("cardname").innerHTML=name;

}

function download(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a");

link.download="card.png";

link.href=canvas.toDataURL();

link.click();

});

}

</script>

</body>
</html>
