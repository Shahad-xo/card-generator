<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>بطاقتك الخاصة</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

.card{
width:500px;
height:300px;
margin:30px auto;
background:#0d6efd;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
border-radius:20px;
}
</style>

</head>

<body>

<h1>اكتب اسمك لتصنع بطاقتك</h1>

<input type="text" id="name" placeholder="اكتب اسمك هنا">
<button onclick="generate()">إنشاء البطاقة</button>

<div class="card" id="card">
اسمك يظهر هنا
</div>

<script>

function generate(){

let name=document.getElementById("name").value;

document.getElementById("card").innerHTML=name;

}

</script>

</body>
</html>
