<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<style>

body{
text-align:center;
background:#f5f5f5;
font-family:Arial;
}

.container{
position:relative;
width:500px;
margin:auto;
}

.container img{
width:100%;
}

.name{
position:absolute;
bottom:180px;
left:50%;
transform:translateX(-50%);
font-size:38px;
color:white;
font-weight:bold;
font-family: 'Tahoma';
}

</style>

</head>

<body>

<h2>اكتب اسمك</h2>

<input type="text" id="name">
<button onclick="generate()">إنشاء البطاقة</button>

<div class="container">

<img src="eid.png">

<div class="name" id="cardname">
اسمك هنا
</div>

</div>

<script>

function generate(){

let name=document.getElementById("name").value;

document.getElementById("cardname").innerHTML=name;

}

</script>

</body>
</html>
