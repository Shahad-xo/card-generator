<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقتك</title>

  <style>
    @font-face {
      font-family: 'zarid';
      src: url('alfont_com_29LTZaridSlab-Bold.ttf') format('truetype');
    }

    body {
      margin: 0;
      padding: 30px 15px;
      background: #f3f5f7;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 34px;
      color: #111;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      width: 320px;
      max-width: 85vw;
      padding: 12px 14px;
      font-size: 20px;
      border: 1px solid #bbb;
      border-radius: 10px;
      text-align: center;
    }

    button {
      padding: 12px 18px;
      font-size: 17px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .generate-btn {
      background: #17345f;
      color: white;
    }

    .download-btn {
      background: #4f74a8;
      color: white;
    }

    #card-wrapper {
      position: relative;
      width: 360px;
      max-width: 90vw;
      margin: 0 auto;
    }

    #cardImage {
      width: 100%;
      display: block;
    }

    #nameOverlay {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 100px;
      width: 72%;
      text-align: center;
      color: #ffffff;
      font-size: 26px;
      line-height: 1.3;
      font-family: 'zarid', Tahoma, Arial, sans-serif;
      word-break: break-word;
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>اكتب اسمك</h1>

  <div class="controls">
    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا" />
    <button class="generate-btn" onclick="generateCard()">إنشاء البطاقة</button>
    <button class="download-btn" onclick="downloadCard()">تحميل البطاقة</button>
  </div>

  <div id="card-wrapper">
    <img id="cardImage" src="eid.png.png" alt="بطاقة العيد" />
    <div id="nameOverlay"></div>
  </div>

  <div class="note">
    تأكدي أن الملفات المرفوعة في GitHub هي:
    index.html
    و eid.png.png
    و alfont_com_29LTZaridSlab-Bold.ttf
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    function generateCard() {
      const name = document.getElementById("nameInput").value.trim();
      document.getElementById("nameOverlay").textContent = name;
    }

    async function downloadCard() {
      const name = document.getElementById("nameInput").value.trim();

      if (!name) {
        alert("اكتبي الاسم أولاً");
        return;
      }

      document.getElementById("nameOverlay").textContent = name;

      const card = document.getElementById("card-wrapper");

      const canvas = await html2canvas(card, {
        useCORS: true,
        scale: 3
      });

      const link = document.createElement("a");
      link.download = "eid-card.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>

</body>
</html>
